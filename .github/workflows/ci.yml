name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build (web)
        working-directory: web
        run: npm run build

      - name: Test (web)
        working-directory: web
        run: npm run test

      - name: Validate world corpus
        run: node scripts/validate-corpus.mjs
